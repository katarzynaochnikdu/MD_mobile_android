android.useAndroidX=true
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
android.generateSyncIssueWhenLibraryConstraintsAreEnabled=false
# KSP 2.3.2 still uses kotlin.sourceSets DSL for generated sources, not yet compatible
# with AGP 9.0's android.builtInKotlin=true enforcement. Suppressed until KSP adds support.
android.disallowKotlinSourceSets=false
